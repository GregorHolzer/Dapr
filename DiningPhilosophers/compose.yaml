    networks:
      - cluster1
      - dining-philosophers

### Client:

  actor-client:
    image: dining-philosophers-dapr:latest
    pull_policy: never
    environment:
      - TYPE=CLIENT
      - DAPR_HTTP_ENDPOINT=http://actor-client-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://actor-client-sidecar:50001
    networks:
      - client
    depends_on:
      - w0
      - w1
      - w2
      - w3
      - w4
      - w5
      - actor-client-sidecar

  actor-client-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "philosopher-client",
      "--app-channel-address", "actor-client",
      "--app-port", "3000",
      "--resources-path", "/components",
    ]
    volumes:
      - "./components:/components"
    networks:
      - client
      - dining-philosophers

### Placement

  placement:
    image: "daprio/placement:edge"
    command: ["./placement", "--port", "50006"]
    networks:
      - dining-philosophers
      - cluster0
      - cluster1

networks:
  dining-philosophers:
  influxdb:
  cluster0:
  cluster1:
  client:

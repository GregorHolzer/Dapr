services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=org
      - DOCKER_INFLUXDB_INIT_BUCKET=bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=bzO10KmR8x
    networks:
      - influxdb

  redis:
    image: redis:6
    networks:
      - dining-philosophers

### Services

  arbitrator:
    build:
      context: ..
      dockerfile: ./DiningPhilosophers/Dockerfile
    image: dining-philosophers-dapr:latest
    environment:
      - HOST_ARBITRATOR_ACTOR=true
      - NUMBER_OF_PHILOSOPHERS=6
      - DAPR_HTTP_ENDPOINT=http://arbitrator-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://arbitrator-sidecar:50001
    networks:
      - cluster0
      - influxdb

  arbitrator-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "arbitrator-sidecar",
      "--app-channel-address", "arbitrator",
      "--app-port", "3000",
      "--resources-path", "/components",
      "--placement-host-address", "placement:50006",
    ]
    volumes:
      - "./components:/components"
    networks:
      - cluster0
      - dining-philosophers

  w0:
    image: dining-philosophers-dapr:latest
    environment:
      - HOST_PHILOSOPHER_PUBSUB=true
      - HOSTED_PHILOSOPHERS=0
      - DAPR_HTTP_ENDPOINT=http://w0-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://w0-sidecar:50001
    networks:
      - cluster0
      - influxdb

  w0-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "w0-sidecar",
      "--app-channel-address", "w0",
      "--app-port", "3000",
      "--resources-path", "/components",
      "--placement-host-address", "placement:50006",
    ]
    volumes:
      - "./components:/components"
    networks:
      - cluster0
      - dining-philosophers

  w1:
    image: dining-philosophers-dapr:latest
    environment:
      - HOST_PHILOSOPHER_PUBSUB=true
      - HOSTED_PHILOSOPHERS=1
      - DAPR_HTTP_ENDPOINT=http://w1-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://w1-sidecar:50001
    networks:
      - cluster0
      - influxdb

  w1-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "w1-sidecar",
      "--app-channel-address", "w1",
      "--app-port", "3000",
      "--resources-path", "/components",
      "--placement-host-address", "placement:50006",
    ]
    volumes:
      - "./components:/components"
    networks:
      - cluster0
      - dining-philosophers

  w2:

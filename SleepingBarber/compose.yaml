services:
  influxdb:
    image: influxdb:2.7
    ports:
     - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=dapr
      - DOCKER_INFLUXDB_INIT_BUCKET=bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=auth
    networks:
      - influx-net

  redis:
    image: redis:6
    networks:
      - sleeping-barber

  actor-service-0:
    build:
      context: ..
      dockerfile: ./SleepingBarber/Dockerfile
    image: sleeping-barber-dapr:latest
    environment:
      - HOST_WAITING_ROOM_SUB=true
      - NUMBER_OF_WAITING_SLOTS=3
      - HOST_CUSTOMER_PUBSUB=true
      - HOSTED_CUSTOMERS=5-9
      - DAPR_HTTP_ENDPOINT=http://actor-service-0-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://actor-service-0-sidecar:50001
    networks:
      - cluster0
      - influx-net

  actor-service-0-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "barber-service-sidecar-0",
      "--app-channel-address", "actor-service-0",
      "--app-port", "3000",
      "--resources-path", "/components",
      "--placement-host-address", "placement0:50006",
    ]
    volumes:
      - "./components:/components"
    networks:
      - cluster0
      - sleeping-barber

  actor-service-1:
    image: sleeping-barber-dapr:latest
    pull_policy: never
    environment:
      - HOST_BARBER_SUB=true
      - HOST_CUSTOMER_PUBSUB=true
      - HOSTED_CUSTOMERS=0-4
      - DAPR_HTTP_ENDPOINT=http://actor-service-1-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://actor-service-1-sidecar:50001
    networks:
      - cluster1
      - influx-net

  actor-service-1-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "philosopher-service-sidecar-1",
      "--app-channel-address", "actor-service-1",
      "--app-port", "3000",
      "--resources-path", "/components",
      "--placement-host-address", "placement1:50006",
    ]
    volumes:
      - "./components:/components"
    networks:
      - cluster1
      - sleeping-barber

  actor-service-2:
    image: sleeping-barber-dapr:latest
    pull_policy: never
    environment:
      - DAPR_HTTP_ENDPOINT=http://actor-service-2-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://actor-service-2-sidecar:50001
    networks:
      - cluster1
      - influx-net

  actor-service-2-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "philosopher-service-sidecar-2",
      "--app-channel-address", "actor-service-2",
      "--app-port", "3000",
      "--resources-path", "/components",
      "--placement-host-address", "placement1:50006",
    ]
    volumes:
      - "./components:/components"
    networks:
      - cluster1
      - sleeping-barber

  actor-client:
    image: sleeping-barber-dapr:latest
    pull_policy: never
    environment:
      - TYPE=CLIENT
      - DAPR_HTTP_ENDPOINT=http://actor-client-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://actor-client-sidecar:50001
    networks:
      - client
      - influx-net
    depends_on:
      - actor-service-0
      - actor-service-1

  actor-client-sidecar:
    image: "daprio/daprd:edge"
    command: [
      "./daprd",
      "--app-id", "philosopher-client",
      "--app-channel-address", "actor-client",
      "--app-port", "3000",
      "--resources-path", "/components",
    ]
    volumes:
      - "./components:/components"
    networks:
      - client
      - sleeping-barber

  placement0:
    image: "daprio/placement:edge"
    command: ["./placement", "--port", "50006"]
    networks:
      - cluster0

  placement1:
    image: "daprio/placement:edge"
    command: [ "./placement", "--port", "50006" ]
    networks:
      - cluster1

networks:
  sleeping-barber:
  cluster0:
  cluster1:
  client:
  influx-net: